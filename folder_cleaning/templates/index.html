<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스마트 파일 정리 도구</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f4f6f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .upload-area { border: 3px dashed #cbd5e1; padding: 40px; text-align: center; background: #fafafa; cursor: pointer; border-radius: 6px; }
        .hidden { display: none; }
        .interactive-zone { margin-top: 20px; padding: 20px; background: #eff6ff; border-left: 5px solid #3b82f6; border-radius: 4px; }
        input[type="text"] { width: 70%; padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2563eb; }
        .file-name { font-weight: bold; color: #1e3a8a; font-size: 1.1em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>📂 온라인 파일 자동 분할 & 정리</h2>
    <p>파일들을 아래 영역에 올리면 PPT와 HWP는 자동 분류되며, 나머지는 하나씩 물어봅니다.</p>
    
    <div id="dropZone" class="upload-area">
        <p>📸여기에 파일들을 드래그하거나 클릭해서 선택하세요.</p>
        <input type="file" id="fileInput" multiple class="hidden">
    </div>

    <div id="interactiveZone" class="interactive-zone hidden">
        <h3>🎯 수동 파일 분류 단계</h3>
        <p>남은 미분류 파일: <span id="remCount">0</span>개</p>
        <div class="file-name" id="currentFileName">파일명.txt</div>
        
        <input type="text" id="folderInput" placeholder="이동할 폴더명 입력 (예: 수학, 사진)" onkeypress="if(event.keyCode==13) moveFile()">
        <button onclick="moveFile()">이동하기</button>
        <button onclick="skipFile()" style="background:#94a3b8;">건너뛰기</button>
    </div>

    <div id="downloadZone" class="hidden" style="margin-top:20px; text-align:center;">
        <h3 style="color:#10b981;">🎉 모든 파일 분류 완료!</h3>
        <button onclick="location.href='/download-zip'" style="background:#10b981; font-size:1.2em; padding:15px 30px;">🎁 정리된 압축파일(.zip) 받기</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const interactiveZone = document.getElementById('interactiveZone');
    const downloadZone = document.getElementById('downloadZone');
    
    let remainingFiles = [];
    let currentIndex = 0;

    // 클릭 및 드래그앤드롭 이벤트
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#e2e8f0'; };
    dropZone.ondragleave = () => dropZone.style.background = '#fafafa';
    dropZone.ondrop = (e) => {
        e.preventDefault();
        uploadFiles(e.dataTransfer.files);
    };
    fileInput.onchange = () => uploadFiles(fileInput.files);

    // 서버로 파일 업로드
    function uploadFiles(files) {
        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }

        dropZone.innerHTML = "⏳ 파일 분석 및 자동 분류 중...";

        fetch('/upload', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                remainingFiles = data.remaining;
                currentIndex = 0;
                dropZone.classList.add('hidden');
                if(remainingFiles.length > 0) {
                    showNextFile();
                } else {
                    showDownload();
                }
            }
        });
    }

    // 다음 파일 보여주기
    function showNextFile() {
        if (currentIndex < remainingFiles.length) {
            interactiveZone.classList.remove('hidden');
            document.getElementById('remCount').innerText = remainingFiles.length - currentIndex;
            document.getElementById('currentFileName').innerText = "📄 " + remainingFiles[currentIndex];
            document.getElementById('folderInput').value = "";
            document.getElementById('folderInput').focus();
        } else {
            interactiveZone.classList.add('hidden');
            showDownload();
        }
    }

    // 지정된 폴더로 이동 전송
    function moveFile() {
        const folderName = document.getElementById('folderInput').value;
        if(!folderName) return alert("폴더 이름을 입력해주세요!");

        const currentFile = remainingFiles[currentIndex];

        fetch('/move-file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_name: currentFile, target_folder: folderName })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                currentIndex++;
                showNextFile();
            }
        });
    }

    // 건너뛰기 규칙 (미분류 폴더에 그대로 유지)
    function skipFile() {
        currentIndex++;
        showNextFile();
    }

    // 최종 결과 창 활성화
    function showDownload() {
        downloadZone.classList.remove('hidden');
    }
</script>
</body>
</html>
